Configuration:
  name: AppHacomConfig
  status: warn
  appenders:
    Console:
      name: Console
      target: SYSTEM_OUT
      PatternLayout:
        Pattern: "%d{yyyy-MM-dd HH:mm:ss} [%t] %-5level %logger{36} - %msg%n"
  Loggers:
    Root:
      level: info
      AppenderRef:
        ref: Console
    Logger:
      - name: com.hacom
        level: debug
        additivity: false
        AppenderRef:
          ref: Console
      - name: org.springframework
        level: info
      - name: org.mongodb.driver
        level: info

